<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="todo">
    <h1>To-Do List</h1>
    <ul class="todo-list">
        <li>
            <input type="checkbox" id="list1">
            <label for="list1">Belajar</label>
            <ul class="sub-item">
                <li>
                    <a href="https://www.freecodecamp.org/learn/responsive-web-design-v9" target="_blank" class="sub-item-link">Responsive web design</a>
                </li>
            </ul>
        </li>
        <li>
            <input type="checkbox" id="list2">
            <label for="list2">Baca</label>
            <ul class="sub-item">
                <li>
                    <a href="https://www.bible.com/" target="_blank" class="sub-item-link">Alkitab</a>
                </li>
            </ul>
        </li>
        <li>
            <input type="checkbox" id="list3">
            <label for="list3">Ngoding</label>
             <ul class="sub-item">
                <li>
                    <a href="https://www.youtube.com/watch?v=lfmg-EJ8gm4" target="_blank" class="sub-item-link">JavaScript</a>
                </li>
            </ul>
        </li>
        <li>
            <input type="checkbox" id="list4">
            <label for="list4">Olahraga</label>
             <ul class="sub-item">
                <li>
                    <a href="https://30dayfitness.app/" target="_blank" class="sub-item-link">30 Day Challenge</a>
                </li>
            </ul>
        </li>
    </ul>
    </div>
</body>

</html>
